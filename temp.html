<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumora – Auth Panels</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --orange: #eb9c40;
    --orange-dark: #d9872b;
    --orange-light: #f3b768;
    --text-dark: #2b2420;
    --text-muted: #948a7c;
    --border: #ece3d4;
    --input-bg: #f8f3ea;
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    font-family:'Poppins', sans-serif;
    background:#e9e2d6;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:24px;
  }

  /* This wrapper is just here so the two panels preview correctly.
     You already have the outer card + close (X) — drop .left-panel
     and .right-panel straight inside it. */
  .auth-card{
    display:flex;
    width:100%;
    max-width:900px;
    min-height:560px;
    background:#fff;
    border-radius:22px;
    overflow:hidden;
    box-shadow:0 30px 60px rgba(0,0,0,.18);
  }

  /* ============ LEFT PANEL ============ */
  .left-panel{
    flex:1;
    background:linear-gradient(160deg, var(--orange), var(--orange-dark));
    color:#fff;
    padding:44px 40px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
  }

  .brand{
    display:flex;
    align-items:center;
    gap:8px;
    font-weight:700;
    font-size:1.15rem;
  }
  .brand svg{ width:20px; height:20px; }

  .left-copy{ margin-top:28px; }
  .left-copy h1{
    font-size:2rem;
    font-weight:700;
    margin:0 0 14px;
    line-height:1.2;
  }
  .left-copy p{
    margin:0;
    font-size:.95rem;
    line-height:1.6;
    color:rgba(255,255,255,.9);
    max-width:320px;
  }

  .illustration{
    display:flex;
    justify-content:center;
    margin:20px 0;
  }
  .illustration svg{ width:200px; height:auto; }

  .features-row{
    display:flex;
    justify-content:space-between;
    gap:8px;
  }
  .feature-item{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
    text-align:center;
    font-size:.75rem;
    font-weight:600;
    flex:1;
  }
  .feature-icon{
    width:42px;
    height:42px;
    border-radius:50%;
    background:rgba(255,255,255,.15);
    border:1px solid rgba(255,255,255,.35);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .feature-icon svg{ width:18px; height:18px; }

  /* ============ RIGHT PANEL ============ */
  .right-panel{
    flex:1.05;
    background:#fff;
    padding:44px 46px;
    display:flex;
    flex-direction:column;
    justify-content:center;
  }

  .right-panel h2{
    font-size:1.6rem;
    font-weight:700;
    color:var(--text-dark);
    margin:0 0 6px;
  }
  .right-panel .subtitle{
    margin:0 0 24px;
    color:var(--text-muted);
    font-size:.9rem;
  }

  .tabs{
    display:flex;
    background:#f4efe4;
    border-radius:999px;
    padding:4px;
    margin-bottom:26px;
  }
  .tab-btn{
    flex:1;
    border:none;
    background:none;
    padding:10px 20px;
    border-radius:999px;
    font-family:inherit;
    font-weight:600;
    font-size:.9rem;
    color:var(--text-muted);
    cursor:pointer;
    transition:.2s;
  }
  .tab-btn.active{
    background:var(--orange);
    color:#fff;
    box-shadow:0 6px 14px rgba(235,156,64,.35);
  }

  .form-group{ margin-bottom:16px; }
  .form-group label{
    display:block;
    font-weight:600;
    font-size:.82rem;
    color:var(--text-dark);
    margin-bottom:6px;
  }
  .input-wrap{
    display:flex;
    align-items:center;
    gap:10px;
    background:var(--input-bg);
    border:1px solid var(--border);
    border-radius:12px;
    padding:0 14px;
    transition:.2s;
  }
  .input-wrap:focus-within{
    border-color:var(--orange);
    background:#fff;
  }
  .input-wrap svg{
    width:16px; height:16px;
    color:var(--text-muted);
    flex-shrink:0;
  }
  .input-wrap input{
    flex:1;
    border:none;
    background:transparent;
    padding:12px 4px;
    font-family:inherit;
    font-size:.9rem;
    outline:none;
    color:var(--text-dark);
    min-width:0;
  }
  .toggle-password{
    background:none;
    border:none;
    cursor:pointer;
    padding:4px;
    display:flex;
    color:var(--text-muted);
  }

  .options-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin:4px 0 20px;
    font-size:.82rem;
  }
  .remember{
    display:flex;
    align-items:center;
    gap:8px;
    color:var(--text-muted);
  }
  .remember input{ accent-color:var(--orange); width:15px; height:15px; }
  .forgot-link{
    color:var(--orange-dark);
    font-weight:600;
    text-decoration:none;
  }
  .forgot-link:hover{ text-decoration:underline; }

  .btn-primary{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:var(--orange);
    color:#fff;
    font-family:inherit;
    font-weight:700;
    font-size:.95rem;
    cursor:pointer;
    transition:.2s;
  }
  .btn-primary:hover{ background:var(--orange-dark); }

  .divider{
    display:flex;
    align-items:center;
    gap:12px;
    margin:22px 0;
    color:var(--text-muted);
    font-size:.78rem;
  }
  .divider::before,
  .divider::after{
    content:"";
    flex:1;
    height:1px;
    background:var(--border);
  }

  .social-row{ display:flex; gap:12px; }
  .social-btn{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    padding:11px 8px;
    border:1px solid var(--border);
    border-radius:12px;
    background:#fff;
    font-family:inherit;
    font-weight:600;
    font-size:.82rem;
    color:var(--text-dark);
    cursor:pointer;
    transition:.2s;
  }
  .social-btn:hover{ background:#faf7f0; }
  .social-btn svg{ width:16px; height:16px; }

  .footer-text{
    text-align:center;
    margin-top:22px;
    font-size:.85rem;
    color:var(--text-muted);
  }
  .footer-text a{
    color:var(--orange-dark);
    font-weight:700;
    text-decoration:none;
    cursor:pointer;
  }
  .footer-text a:hover{ text-decoration:underline; }

  .signup-only{ display:none; }
  .right-panel.mode-signup .signup-only{ display:block; }

  @media (max-width:720px){
    .auth-card{ flex-direction:column; min-height:auto; }
    .left-panel{ padding:32px; }
    .illustration{ display:none; }
  }
</style>
</head>
<body>

<div class="auth-card">

  <!-- ======================= LEFT PANEL ======================= -->
  <div class="left-panel">
    <div class="brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 8h12l-1 12H7L6 8z"/>
        <path d="M9 8V6a3 3 0 0 1 6 0v2"/>
      </svg>
      Lumora
    </div>

    <div class="left-copy">
      <h1>Welcome Back!</h1>
      <p>Discover premium products, exclusive deals and a better shopping experience.</p>
    </div>

    <div class="illustration">
      <svg viewBox="0 0 260 230" xmlns="http://www.w3.org/2000/svg">
        <!-- potted plant -->
        <path d="M18 190 L34 190 L38 212 L14 212 Z" fill="#d99a55"/>
        <path d="M26 190 C 10 174 8 152 22 134" stroke="#fbeedb" stroke-width="5" fill="none" stroke-linecap="round"/>
        <path d="M26 190 C 34 168 44 152 36 128" stroke="#fbeedb" stroke-width="5" fill="none" stroke-linecap="round"/>
        <path d="M26 190 C 26 164 20 146 32 128" stroke="#fbeedb" stroke-width="5" fill="none" stroke-linecap="round"/>

        <!-- bag handles -->
        <path d="M96 72 C 96 40 128 40 128 72" stroke="#fbeedb" stroke-width="7" fill="none" stroke-linecap="round"/>
        <path d="M158 72 C 158 40 190 40 190 72" stroke="#fbeedb" stroke-width="7" fill="none" stroke-linecap="round"/>

        <!-- bag body -->
        <path d="M72 76 L214 76 L203 208 L83 208 Z" fill="#fbeedb"/>
        <line x1="143" y1="76" x2="143" y2="208" stroke="#eddcc0" stroke-width="2"/>

        <!-- tag + heart -->
        <line x1="182" y1="82" x2="200" y2="112" stroke="#e3cfa9" stroke-width="2"/>
        <rect x="188" y="106" width="36" height="26" rx="5" fill="#fdf6ea" stroke="#e8d5b8" stroke-width="1.5" transform="rotate(18 206 119)"/>
        <path d="M200 119c0-2.5 2.3-3.5 3.4-1.2 1.1-2.3 3.4-1.3 3.4 1.2 0 2.5-3.4 4.6-3.4 4.6s-3.4-2.1-3.4-4.6z" fill="var(--orange)" transform="rotate(18 206 119)"/>
      </svg>
    </div>

    <div class="features-row">
      <div class="feature-item">
        <div class="feature-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="12 2 15 9 22 9.5 17 14.5 18.5 22 12 18 5.5 22 7 14.5 2 9.5 9 9 12 2"/>
          </svg>
        </div>
        Premium Quality
      </div>
      <div class="feature-item">
        <div class="feature-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2 4 5v6c0 5 3.5 9 8 11 4.5-2 8-6 8-11V5l-8-3z"/>
            <path d="M9 12l2 2 4-4"/>
          </svg>
        </div>
        Secure Shopping
      </div>
      <div class="feature-item">
        <div class="feature-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.59 13.41 11 3.83A2 2 0 0 0 9.5 3H4a1 1 0 0 0-1 1v5.5a2 2 0 0 0 .59 1.41l9.58 9.58a2 2 0 0 0 2.83 0l4.59-4.59a2 2 0 0 0 0-2.83z"/>
            <circle cx="7.5" cy="7.5" r="1.1" fill="currentColor" stroke="none"/>
          </svg>
        </div>
        Best Prices
      </div>
    </div>
  </div>

  <!-- ======================= RIGHT PANEL ======================= -->
  <div class="right-panel" id="rightPanel">

    <h2>Hello Again 👋</h2>
    <p class="subtitle">Login to your account or create a new one</p>

    <div class="tabs">
      <button type="button" class="tab-btn active" data-mode="login">Login</button>
      <button type="button" class="tab-btn" data-mode="signup">Signup</button>
    </div>

    <form id="authForm">

      <div class="form-group signup-only">
        <label>Email</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="5" width="18" height="14" rx="2"/>
            <path d="M3 7l9 6 9-6"/>
          </svg>
          <input type="email" placeholder="Enter your email">
        </div>
      </div>

      <div class="form-group">
        <label>Username</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="8" r="4"/>
            <path d="M4 21c0-4 3.5-7 8-7s8 3 8 7"/>
          </svg>
          <input type="text" placeholder="Enter your username">
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="5" y="11" width="14" height="9" rx="2"/>
            <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
          </svg>
          <input type="password" id="passwordInput" placeholder="Enter your password">
          <button type="button" class="toggle-password" id="togglePassword" aria-label="Show password">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="options-row">
        <label class="remember">
          <input type="checkbox"> Remember me
        </label>
        <a href="#" class="forgot-link">Forgot Password?</a>
      </div>

      <button type="submit" class="btn-primary" id="submitBtn">Login</button>
    </form>

    <div class="divider">or continue with</div>

    <div class="social-row">
      <button type="button" class="social-btn">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M23.5 12.27c0-.79-.07-1.54-.19-2.27H12v4.51h6.47c-.29 1.48-1.14 2.73-2.4 3.58v3h3.86c2.26-2.09 3.57-5.17 3.57-8.82z"/><path fill="#34A853" d="M12 24c3.24 0 5.95-1.08 7.93-2.91l-3.86-3c-1.08.72-2.45 1.15-4.07 1.15-3.13 0-5.78-2.11-6.73-4.96H1.29v3.09C3.26 21.3 7.31 24 12 24z"/><path fill="#FBBC05" d="M5.27 14.28A7.2 7.2 0 0 1 4.89 12c0-.79.14-1.56.38-2.28V6.63H1.29A11.98 11.98 0 0 0 0 12c0 1.94.46 3.77 1.29 5.37l3.98-3.09z"/><path fill="#EA4335" d="M12 4.77c1.77 0 3.35.61 4.6 1.8l3.43-3.43C17.94 1.19 15.24 0 12 0 7.31 0 3.26 2.7 1.29 6.63l3.98 3.09C6.22 6.88 8.87 4.77 12 4.77z"/></svg>
        Google
      </button>
      <button type="button" class="social-btn">
        <svg viewBox="0 0 24 24" fill="#1877F2"><path d="M22 12a10 10 0 1 0-11.56 9.88v-6.99H7.9V12h2.54V9.8c0-2.5 1.49-3.89 3.77-3.89 1.09 0 2.24.2 2.24.2v2.46h-1.26c-1.24 0-1.63.77-1.63 1.56V12h2.78l-.44 2.89h-2.34v6.99A10 10 0 0 0 22 12z"/></svg>
        Facebook
      </button>
      <button type="button" class="social-btn">
        <svg viewBox="0 0 24 24" fill="#111"><path d="M16.36 1.6c.06 1.1-.34 2.13-1 2.9-.7.8-1.83 1.42-2.93 1.33-.1-1.06.4-2.16 1.05-2.9.72-.82 1.98-1.42 2.88-1.33zM20.7 17.2c-.5 1.14-.74 1.64-1.38 2.64-.9 1.4-2.16 3.14-3.73 3.16-1.4.02-1.76-.9-3.66-.89-1.9.01-2.3.9-3.7.88-1.57-.02-2.76-1.6-3.66-3-2.5-3.9-2.77-8.47-1.22-10.9 1.1-1.73 2.83-2.75 4.46-2.75 1.65 0 2.7.9 4.06.9 1.32 0 2.13-.9 4.03-.9 1.45 0 2.98.79 4.08 2.15-3.6 1.98-3.02 7.13.72 8.71z"/></svg>
        Apple
      </button>
    </div>

    <p class="footer-text" id="footerText">
      Don't have an account? <a id="switchLink">Signup</a>
    </p>

  </div>
</div>

<script>
  const rightPanel   = document.getElementById('rightPanel');
  const tabBtns      = document.querySelectorAll('.tab-btn');
  const submitBtn    = document.getElementById('submitBtn');
  const footerText   = document.getElementById('footerText');
  const switchLink   = document.getElementById('switchLink');

  function setMode(mode){
    tabBtns.forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
    if(mode === 'signup'){
      rightPanel.classList.add('mode-signup');
      submitBtn.textContent = 'Signup';
      footerText.innerHTML = 'Already have an account? <a id="switchLink2">Login</a>';
      document.getElementById('switchLink2').addEventListener('click', () => setMode('login'));
    } else {
      rightPanel.classList.remove('mode-signup');
      submitBtn.textContent = 'Login';
      footerText.innerHTML = "Don't have an account? <a id=\"switchLink2\">Signup</a>";
      document.getElementById('switchLink2').addEventListener('click', () => setMode('signup'));
    }
  }

  tabBtns.forEach(btn => btn.addEventListener('click', () => setMode(btn.dataset.mode)));
  switchLink.addEventListener('click', () => setMode('signup'));

  // show / hide password
  const pwInput  = document.getElementById('passwordInput');
  const pwToggle = document.getElementById('togglePassword');
  pwToggle.addEventListener('click', () => {
    const isHidden = pwInput.type === 'password';
    pwInput.type = isHidden ? 'text' : 'password';
    pwToggle.innerHTML = isHidden
      ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a21.6 21.6 0 0 1 5.06-5.94M9.9 4.24A10.4 10.4 0 0 1 12 4c7 0 11 7 11 7a21.6 21.6 0 0 1-2.34 3.24M14.12 14.12a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
      : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>';
  });

  // prevent actual page reload in this demo — hook your real auth logic here
  document.getElementById('authForm').addEventListener('submit', e => e.preventDefault());
</script>

</body>
</html>
